<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaFix | Hojas de diagnostico</title>
    <link rel="icon" href="../icos/logoNova.png" type="image/png" />

    <link rel="stylesheet" href="../css/stylesHojas.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <div class="contenedorHojas">
      <header class="header_hojas">
        <nav>
          <div class="menu">
            <a href="../../index.html" aria-label="Volver al inicio">
              <img id="logo" src="../icos/logoNova.png" alt="Logo NovaFix" />
            </a>

            <div class="navOpciones">
              <div class="tituloGrupo">
                <h3>NovaFix - Hojas de diagnostico realizadas</h3>
                <p id="saveStatus" role="status">Cargando hojas...</p>
              </div>

              <div class="opciones" aria-label="Opciones de hojas">
                <div class="opcion menuItem" tabindex="0">
                  Descargar
                  <div class="dropdownMenu">
                    <button type="button" data-menu-action="print-visible">
                      <span class="material-symbols-outlined">picture_as_pdf</span>
                      PDF de hojas visibles
                    </button>
                    <button type="button" data-menu-action="print-first">
                      <span class="material-symbols-outlined">article</span>
                      PDF de primera hoja
                    </button>
                    <div class="submenuItem">
                      <button type="button">
                        <span class="material-symbols-outlined">download</span>
                        Exportar por estado
                        <span class="material-symbols-outlined arrow">chevron_right</span>
                      </button>
                      <div class="dropdownMenu submenu">
                        <button type="button" data-menu-action="print-status" data-status="Pendiente">Pendientes</button>
                        <button type="button" data-menu-action="print-status" data-status="En proceso">En proceso</button>
                        <button type="button" data-menu-action="print-status" data-status="Finalizado">Finalizadas</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="opcion menuItem" tabindex="0">
                  Detalles
                  <div class="dropdownMenu">
                    <button type="button" data-menu-action="filter" data-status="Todos">Todas las hojas</button>
                    <button type="button" data-menu-action="filter" data-status="Pendiente">Pendientes</button>
                    <button type="button" data-menu-action="filter" data-status="En proceso">En proceso</button>
                    <button type="button" data-menu-action="filter" data-status="Finalizado">Finalizadas</button>
                  </div>
                </div>

                <div class="opcion menuItem" tabindex="0">
                  Ver
                  <div class="dropdownMenu">
                    <button type="button" data-menu-action="refresh">
                      <span class="material-symbols-outlined">refresh</span>
                      Actualizar ahora
                    </button>
                    <div class="submenuItem">
                      <button type="button">
                        <span class="material-symbols-outlined">zoom_in</span>
                        Zoom
                        <span class="material-symbols-outlined arrow">chevron_right</span>
                      </button>
                      <div class="dropdownMenu submenu">
                        <button type="button" data-menu-action="zoom" data-zoom="70">70%</button>
                        <button type="button" data-menu-action="zoom" data-zoom="85">85%</button>
                        <button type="button" data-menu-action="zoom" data-zoom="100">100%</button>
                      </div>
                    </div>
                    <button type="button" data-menu-action="fit-width">
                      <span class="material-symbols-outlined">fit_width</span>
                      Ajustar al ancho
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </nav>
      </header>

      <section class="contePricnipal">
        <main class="hojasViewport">
          <div class="emptyState hidden" id="emptyState">
            <span class="material-symbols-outlined">description</span>
            <h2>No hay hojas para mostrar</h2>
            <p>Prueba a crear una hoja nueva o revisa tu conexion a internet.</p>
          </div>
          <div class="hojas" id="hojas"></div>
        </main>
      </section>
    </div>

    <script src="../js/hojasRender.js"></script>
  </body>
</html>
